# ─────────────────────────────────────────────────────────────────────────────
# Production compose — adds Streamlit dashboard alongside React
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: smartgrid-streamlit
    command: python -m streamlit run dashboard/app.py --server.port 8501 --server.headless true --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - grid_net
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
