server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA — all unknown routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all API calls to the backend service
    # Inside Docker network, "backend" resolves to the backend container
    location ~ ^/(state|telemetry|anomaly|load|alerts|predict|usb|summary|docs|openapi.json|redoc) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        # Allow streaming responses (for future WebSocket support)
        proxy_buffering    off;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
